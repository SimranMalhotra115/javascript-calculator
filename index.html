<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Calculator</title>

  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6/babel.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #c2c2d6;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    #calculator {
      width: 340px;
      background: #000;
      border: 2px solid #47476b;
      padding: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.35);
    }

    .formula-screen {
      min-height: 22px;
      color: orange;
      text-align: right;
      font-size: 1.1rem;
      padding: 4px 8px 2px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    #display {
      min-height: 42px;
      color: white;
      text-align: right;
      font-size: 1.9rem;
      padding: 4px 8px 10px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #000;
    }

    button {
      border: none;
      min-height: 65px;
      font-size: 1.35rem;
      cursor: pointer;
      color: white;
      background: #4d4d4d;
    }

    button:hover {
      outline: 1px solid white;
      color: black;
      z-index: 1;
    }

    .operator {
      background: #666;
    }

    #clear {
      grid-column: span 2;
      background: #ac3939;
    }

    #equals {
      grid-row: span 2;
      background: #004466;
    }

    #zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>

  <script type="text/babel">
    function App() {
      const [formula, setFormula] = React.useState("");
      const [display, setDisplay] = React.useState("0");
      const [evaluated, setEvaluated] = React.useState(false);

      const isOperator = (val) => /[+\-*/]/.test(val);

      const clearAll = () => {
        setFormula("");
        setDisplay("0");
        setEvaluated(false);
      };

      const handleNumber = (num) => {
        if (evaluated) {
          setFormula(num);
          setDisplay(num);
          setEvaluated(false);
          return;
        }

        if (display === "0") {
          if (num === "0") {
            if (formula === "" || /(?:^|[+\-*/])0$/.test(formula)) {
              return;
            }
          }

          if (formula === "") {
            setFormula(num);
            setDisplay(num);
            return;
          }

          if (/[+\-*/]$/.test(formula)) {
            setFormula((prev) => prev + num);
            setDisplay(num);
            return;
          }

          setFormula((prev) => prev.replace(/0$/, num));
          setDisplay(num);
          return;
        }

        if (isOperator(display)) {
          setFormula((prev) => prev + num);
          setDisplay(num);
          return;
        }

        setFormula((prev) => prev + num);
        setDisplay((prev) => prev + num);
      };

      const handleDecimal = () => {
        if (evaluated) {
          setFormula("0.");
          setDisplay("0.");
          setEvaluated(false);
          return;
        }

        if (display.includes(".")) return;

        if (isOperator(display) || formula === "") {
          setFormula((prev) => prev + "0.");
          setDisplay("0.");
          return;
        }

        setFormula((prev) => prev + ".");
        setDisplay((prev) => prev + ".");
      };

      const handleOperator = (operator) => {
        if (evaluated) {
          setFormula(display + operator);
          setDisplay(operator);
          setEvaluated(false);
          return;
        }

        if (formula === "") {
          if (operator === "-") {
            setFormula("-");
            setDisplay("-");
          }
          return;
        }

        const lastChar = formula.slice(-1);
        const secondLastChar = formula.slice(-2, -1);

        if (isOperator(lastChar)) {
          if (operator === "-" && lastChar !== "-") {
            setFormula((prev) => prev + operator);
            setDisplay(operator);
          } else {
            if (isOperator(secondLastChar)) {
              setFormula((prev) => prev.slice(0, -2) + operator);
            } else {
              setFormula((prev) => prev.slice(0, -1) + operator);
            }
            setDisplay(operator);
          }
          return;
        }

        setFormula((prev) => prev + operator);
        setDisplay(operator);
      };

      const handleEquals = () => {
        if (formula === "") return;

        let expression = formula;

        while (/[+\-*/]$/.test(expression)) {
          expression = expression.slice(0, -1);
        }

        expression = expression.replace(/--/g, "+");

        try {
          let result = Function('"use strict"; return (' + expression + ')')();
          result = Math.round((result + Number.EPSILON) * 1000000000000) / 1000000000000;
          result = result.toString();

          setFormula(expression + "=" + result);
          setDisplay(result);
          setEvaluated(true);
        } catch (e) {
          setDisplay("Error");
        }
      };

      return (
        <div id="calculator">
          <div className="formula-screen">{formula || "0"}</div>
          <div id="display">{display}</div>

          <div className="buttons">
            <button id="clear" onClick={clearAll}>AC</button>
            <button id="divide" className="operator" onClick={() => handleOperator("/")}>/</button>
            <button id="multiply" className="operator" onClick={() => handleOperator("*")}>*</button>

            <button id="seven" onClick={() => handleNumber("7")}>7</button>
            <button id="eight" onClick={() => handleNumber("8")}>8</button>
            <button id="nine" onClick={() => handleNumber("9")}>9</button>
            <button id="subtract" className="operator" onClick={() => handleOperator("-")}>-</button>

            <button id="four" onClick={() => handleNumber("4")}>4</button>
            <button id="five" onClick={() => handleNumber("5")}>5</button>
            <button id="six" onClick={() => handleNumber("6")}>6</button>
            <button id="add" className="operator" onClick={() => handleOperator("+")}>+</button>

            <button id="one" onClick={() => handleNumber("1")}>1</button>
            <button id="two" onClick={() => handleNumber("2")}>2</button>
            <button id="three" onClick={() => handleNumber("3")}>3</button>
            <button id="equals" onClick={handleEquals}>=</button>

            <button id="zero" onClick={() => handleNumber("0")}>0</button>
            <button id="decimal" onClick={handleDecimal}>.</button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
